<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMEX - OCR Image to Text Windows App</title>

<meta name="description" content="IMEX is a Windows OCR app to extract text from images and screenshots instantly.">
<meta name="keywords" content="OCR Windows, image to text, screenshot OCR, C# OCR">
<meta name="author" content="Liquid-F0rm">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#e2e8f0;
  text-align:center;
}

.hero{
  padding:100px 20px;
}

h1{
  font-size:60px;
  background:linear-gradient(90deg,#3b82f6,#6366f1);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  font-size:20px;
  color:#94a3b8;
}

.btn{
  display:inline-block;
  margin-top:30px;
  padding:18px 40px;
  font-size:20px;
  color:white;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  border-radius:12px;
  text-decoration:none;
  transition:.3s;
}
.btn:hover{
  transform:scale(1.1);
}

.badges img{
  margin:5px;
}

.section{
  padding:60px 20px;
}

.card{
  background:#1e293b;
  padding:20px;
  margin:10px;
  border-radius:12px;
  display:inline-block;
}

.screens img{
  width:80%;
  max-width:700px;
  margin:20px 0;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>IMEX</h1>
  <p id="desc">Extract text from images instantly.</p>

  <a class="btn" id="btn" href="https://github.com/Liquid-F0rm/IMEX/releases/latest">
    ⬇ Download IMEX
  </a>

  <div class="badges">
    <img src="https://img.shields.io/github/downloads/Liquid-F0rm/IMEX/total">
    <img src="https://img.shields.io/github/v/release/Liquid-F0rm/IMEX">
    <img src="https://img.shields.io/github/stars/Liquid-F0rm/IMEX">
  </div>
</div>

<div class="section">
  <h2 id="featTitle">Features</h2>
  <div id="featList">
    <div class="card">📸 Screenshot</div>
    <div class="card">🖱️ Drag & Drop</div>
    <div class="card">🔎 OCR</div>
    <div class="card">💾 Export</div>
  </div>
</div>

<div class="section screens">
  <h2 id="prevTitle">Preview</h2>
  <img src="screenshot1.png">
  <img src="screenshot2.png">
</div>

<script>
const lang = navigator.language;
if(lang.startsWith("fr")){
  document.getElementById("desc").innerText =
    "Extraction de texte depuis des images et captures d’écran.";

  document.getElementById("btn").innerText =
    "⬇ Télécharger IMEX";

  document.getElementById("featTitle").innerText =
    "Fonctionnalités";

  document.getElementById("prevTitle").innerText =
    "Aperçu";
}
</script>

</body>
</html>
