<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMEX - OCR Image to Text Windows App</title>

<meta name="description" content="IMEX is a Windows OCR app to extract text from images and screenshots instantly. Fast, lightweight and portable.">
<meta name="keywords" content="OCR Windows, image to text, screenshot OCR, C# WPF OCR">
<meta name="author" content="Liquid-F0rm">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#e2e8f0;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

h1{
  font-size:70px;
  background:linear-gradient(90deg,#3b82f6,#6366f1);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:fadeUp 1s ease;
}

p{
  font-size:20px;
  color:#94a3b8;
  max-width:700px;
  animation:fadeUp 1.2s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:18px 40px;
  font-size:20px;
  color:white;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  border-radius:12px;
  text-decoration:none;
  transition:.3s;
  box-shadow:0 10px 30px rgba(59,130,246,.5);
}
.btn:hover{
  transform:scale(1.1);
  box-shadow:0 20px 50px rgba(99,102,241,.7);
}

/* BADGES */
.badges img{
  margin:5px;
}

/* SECTIONS */
.section{
  padding:80px 20px;
  text-align:center;
}

/* CARDS */
.features{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  transition:.3s;
}
.card:hover{
  transform:translateY(-10px);
  box-shadow:0 20px 40px rgba(0,0,0,.5);
}

/* IMAGES */
.screens img{
  width:80%;
  max-width:800px;
  border-radius:12px;
  margin:20px 0;
  transition:.3s;
}
.screens img:hover{
  transform:scale(1.05);
}

/* SCROLL ANIMATION */
.hidden{
  opacity:0;
  transform:translateY(40px);
  transition:all .8s ease;
}
.show{
  opacity:1;
  transform:translateY(0);
}

footer{
  padding:40px;
  font-size:14px;
  color:#64748b;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>IMEX</h1>
  <p id="desc">Extract text from images and screenshots instantly using OCR.</p>

  <a class="btn" id="btn" href="https://github.com/Liquid-F0rm/IMEX/releases/latest">
    ⬇ Download IMEX
  </a>

  <div class="badges">
    <img src="https://img.shields.io/github/downloads/Liquid-F0rm/IMEX/total">
    <img src="https://img.shields.io/github/v/release/Liquid-F0rm/IMEX">
    <img src="https://img.shields.io/github/stars/Liquid-F0rm/IMEX">
  </div>
</div>

<!-- FEATURES -->
<div class="section hidden">
  <h2 id="featTitle">Features</h2>
  <div class="features" id="featList">
    <div class="card">📸 Screenshot capture</div>
    <div class="card">🖱️ Drag & Drop</div>
    <div class="card">🔎 OCR extraction</div>
    <div class="card">💾 Export text</div>
    <div class="card">🌙 Light / Dark theme</div>
  </div>
</div>

<!-- SCREENSHOTS -->
<div class="section screens hidden">
  <h2 id="prevTitle">Preview</h2>
  <img src="screenshot1.png">
  <img src="screenshot2.png">
</div>

<footer>
© 2026 - IMEX by Liquid-F0rm
</footer>

<script>
// 🌍 langue auto
const lang = navigator.language;
if(lang.startsWith("fr")){
  document.getElementById("desc").innerText =
    "Extrayez du texte depuis des images et captures d’écran instantanément.";

  document.getElementById("btn").innerText =
    "⬇ Télécharger IMEX";

  document.getElementById("featTitle").innerText = "Fonctionnalités";
  document.getElementById("prevTitle").innerText = "Aperçu";

  document.getElementById("featList").innerHTML = `
    <div class="card">📸 Capture d’écran</div>
    <div class="card">🖱️ Glisser-déposer</div>
    <div class="card">🔎 Extraction OCR</div>
    <div class="card">💾 Export texte</div>
    <div class="card">🌙 Thème clair / sombre</div>
  `;
}

// 🔥 animation scroll
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".hidden").forEach(el=>observer.observe(el));
</script>

</body>
</html>
